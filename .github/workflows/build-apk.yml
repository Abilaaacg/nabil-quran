name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update version.json and changelog.json
        run: |
          echo "{\"version\": \"v${{ github.run_number }}\", \"url\": \"https://github.com/Abilaaacg/nabil-quran/releases/download/v${{ github.run_number }}/nabil-quran.apk\", \"size\": \"\"}" > public/version.json
          node -e "
          const fs = require('fs');
          const cl = JSON.parse(fs.readFileSync('public/changelog.json','utf8'));
          cl.version = 'v${{ github.run_number }}';
          fs.writeFileSync('public/changelog.json', JSON.stringify(cl));
          "

      - name: Build web app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.run_number }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk nabil-quran.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nabil-quran-apk
          path: nabil-quran.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "نور الإسلام v${{ github.run_number }}"
          body: |
            ## 📱 تطبيق نور الإسلام للأندرويد

            ### تحميل التطبيق:
            قم بتحميل ملف `nabil-quran.apk` من الأسفل وثبته على هاتفك

            > ملاحظة: قد تحتاج لتفعيل "السماح بمصادر غير معروفة" في إعدادات هاتفك
          files: nabil-quran.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy website to Netlify
        run: |
          cd dist
          zip -r ../dist.zip .
          cd ..
          curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/bae8dbee-a4ef-428b-9f38-f806e20445ed/deploys" \
            -H "Authorization: Bearer $NETLIFY_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @dist.zip \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Netlify deploy state:', d.get('state'))"
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
