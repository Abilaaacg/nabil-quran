name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update version.json
        run: |
          echo "{\"version\": \"v${{ github.run_number }}\", \"url\": \"https://github.com/Abilaaacg/nabil-quran/releases/download/v${{ github.run_number }}/nabil-quran.apk\", \"size\": \"\"}" > public/version.json

      - name: Build web app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.run_number }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup consistent signing keystore
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
            echo "✅ Keystore loaded from secret"
          else
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo ""
            echo "========================================"
            echo "⚠️  ADD THIS AS GitHub Secret: KEYSTORE_BASE64"
            echo "========================================"
            base64 -w 0 ~/.android/debug.keystore
            echo ""
            echo "========================================"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk nabil-quran.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nabil-quran-apk
          path: nabil-quran.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "نور الإسلام v${{ github.run_number }}"
          body: |
            ## 📱 تطبيق نبيل قرآن للأندرويد

            ### تحميل التطبيق:
            قم بتحميل ملف `nabil-quran.apk` من الأسفل وثبته على هاتفك

            > ملاحظة: قد تحتاج لتفعيل "السماح بمصادر غير معروفة" في إعدادات هاتفك
          files: nabil-quran.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
